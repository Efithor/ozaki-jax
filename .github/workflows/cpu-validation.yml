name: cpu-validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cpu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      JAX_ENABLE_X64: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run CPU validation
        run: uv run python benchmarks/ci_cpu_validate.py
